database:
  postgresql:
    host: localhost
    port: 5432
    database: aetherguard
    user: postgres
    password: postgres
    ssl_mode: disable
    min_connections: 10
    max_connections: 100
    conn_timeout: 30s
    idle_timeout: 5m
    health_check_interval: 60s
  
  timescaledb:
    host: localhost
    port: 5433
    database: aetherguard_timeseries
    user: postgres
    password: postgres
    ssl_mode: disable
    min_connections: 10
    max_connections: 100
    chunk_interval: "1 week"

cache:
  addresses:
    - localhost:6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10
  max_retries: 3
  default_ttl: 5m
  cluster_mode: false

eventbus:
  brokers:
    - localhost:9092
  group_id: aetherguard-consumer
  client_id: aetherguard-producer
  replication_factor: 1
  num_partitions: 3
  retry_attempts: 3
  retry_backoff: 1s

monitoring:
  metrics_port: 9090
  health_check_port: 8080
  log_level: info
