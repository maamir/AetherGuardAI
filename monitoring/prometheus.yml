global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # AetherGuard Proxy Engine Metrics
  - job_name: 'aetherguard-proxy'
    static_configs:
      - targets: ['proxy-engine:9090']
    scrape_interval: 10s
    metrics_path: /metrics
    scheme: http

  # Backend API Metrics
  - job_name: 'aetherguard-api'
    static_configs:
      - targets: ['backend-api:8081']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ML Services Metrics
  - job_name: 'aetherguard-ml'
    static_configs:
      - targets: ['ml-services:8001']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # PostgreSQL Metrics (if postgres_exporter is used)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis Metrics (if redis_exporter is used)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Node Exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Nginx Metrics (if nginx-prometheus-exporter is used)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 30s