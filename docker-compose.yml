version: '3.8'

services:
  # Backend API Service
  backend-api:
    build: 
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - JWT_SECRET=<key>
      - DATABASE_URL=<connectionstring>
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aetherguard

  # ML Services
  ml-services:
    build: 
      context: ./ml-services
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=<connectionstring>
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aetherguard

  # Rust Proxy Engine
  proxy-engine:
    build: 
      context: ./proxy-engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ML_SERVICE_URL=http://ml-services:8001
      - BACKEND_API_URL=http://backend-api:8080
    depends_on:
      - ml-services
      - backend-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aetherguard

  # Web Portal
  web-portal:
    build: 
      context: ./web-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8081
      - VITE_ML_API_URL=http://localhost:8001
      - VITE_PROXY_URL=http://localhost:8080
    depends_on:
      - backend-api
    volumes:
      - ./web-portal/src:/app/src
      - ./web-portal/public:/app/public
    networks:
      - aetherguard

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=<>
      - POSTGRES_USER=<>
      - POSTGRES_PASSWORD=<>
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherguard"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aetherguard

  # Redis (for caching and sessions)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aetherguard

volumes:
  postgres_data:
  redis_data:

networks:
  aetherguard:
    driver: bridge